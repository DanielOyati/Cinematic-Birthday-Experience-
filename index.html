<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Porsche Birthday Film</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;500;700&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        overflow: hidden;
        background: #000;
        font-family: Montserrat;
        /* font-family: 'Manrope', sans-serif; */
        /* font-family: 'Poppins', sans-serif; */
        color: white;
      }

      /* =========================
   NETFLIX RED INTRO (FIXED)
========================= */
      #intro {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #2a0000, #000000);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 1000;
        animation: fadeOut 3.5s ease 3s forwards;
        padding: 20px;
        text-align: center;
      }

      #intro h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        letter-spacing: 14px;
        color: #e50914;
        text-shadow: 0 0 35px rgba(229, 9, 20, 0.8);
        animation: zoom 2s ease;
      }

      #intro p {
        margin-top: 12px;
        letter-spacing: 6px;
        color: #ffffff;
        opacity: 0;
        animation: fadeIn 2s ease 1s forwards;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        font-size: clamp(0.8rem, 2.5vw, 1rem);
      }

      @keyframes zoom {
        from {
          transform: scale(0.6);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
          visibility: hidden;
        }
      }

      /* =========================
   LOGIN
========================= */
      #login {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: radial-gradient(circle, #120000, #000);
        z-index: 500;
        padding: 20px;
        text-align: center;
      }

      h2 {
        color: #fff;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        font-size: clamp(1.2rem, 4vw, 1.8rem);
      }

      input {
        padding: 12px;
        width: clamp(180px, 70vw, 260px);
        border-radius: 10px;
        border: none;
        text-align: center;
        margin-top: 10px;
        background: #111;
        color: #fff;
        outline: none;
      }

      button {
        margin-top: 15px;
        padding: 10px 25px;
        border: none;
        background: #e50914;
        color: white;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(229, 9, 20, 0.3);
      }

      /* =========================
   SCENES
========================= */
      .scene {
        position: absolute;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: 2s ease;
        pointer-events: none;
        padding: 20px;
      }

      .scene.active {
        opacity: 1;
        pointer-events: auto;
      }

      /* =========================
   SCENE 1
========================= */
      #scene1 {
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle, #1a0000, #000);
        text-align: center;
      }

      .title {
        font-size: clamp(1.5rem, 5vw, 2.4rem);
        color: #e50914;
        letter-spacing: 5px;
        text-shadow: 0 0 20px rgba(229, 9, 20, 0.6);
        animation: pulse 2s infinite alternate;
      }

      @keyframes pulse {
        from {
          transform: scale(1);
          opacity: 0.8;
        }
        to {
          transform: scale(1.05);
          opacity: 1;
        }
      }

      /* =========================
   SCENE 2 CARD
========================= */
      .card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: clamp(260px, 80vw, 360px);
        padding: 22px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(20px);
        text-align: center;
        box-shadow: 0 0 80px rgba(229, 9, 20, 0.25);
      }

      .card img {
        width: clamp(90px, 30vw, 140px);
        height: clamp(90px, 30vw, 140px);
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #e50914;
        box-shadow: 0 0 35px rgba(229, 9, 20, 0.5);
        animation: breath 3s infinite ease-in-out;
      }

      @keyframes breath {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
      }

      h1 {
        font-family: Playfair Display;
        color: #ffffff;
        margin-top: 10px;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        font-size: clamp(1.2rem, 4vw, 1.8rem);
      }

      .crown {
        font-size: clamp(24px, 6vw, 34px);
        color: #ffd700;
        animation: float 2s infinite ease-in-out;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      }

      @keyframes float {
        50% {
          transform: translateY(-10px);
        }
      }

      #letter {
        margin-top: 12px;
        font-size: clamp(12px, 2.8vw, 14px);
        min-height: 120px;
        line-height: 1.6;
        opacity: 0;
        transition: 1s;
        color: #f1f1f1;
      }

      /* =========================
   SCENE 3
========================= */
      #scene3 {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
      }

      #gift {
        font-size: clamp(60px, 20vw, 90px);
        opacity: 0;
        transform: scale(0);
        transition: 2s;
        filter: drop-shadow(0 0 10px gold);
      }

      #cake {
        font-size: clamp(65px, 22vw, 95px);
        opacity: 0;
        transition: 2s;
        filter: drop-shadow(0 0 10px #e50914);
      }

      /* =========================
   CANVAS FX
========================= */
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      /* MUSIC */
      audio {
        display: none;
      }
    </style>
  </head>

  <body>
    <canvas id="fx"></canvas>

    <!-- NETFLIX INTRO -->
    <div id="intro">
      <h1>NETFLIX</h1>
      <p>BROOKLYN CINEMATIC EXPERIENCE</p>
    </div>

    <!-- LOGIN -->
    <div id="login">
      <h2>Enter Access Code</h2>
      <input id="code" placeholder="Brooklyn" />
      <button onclick="unlock()">Unlock</button>
    </div>

    <!-- SCENES -->
    <div id="scene1" class="scene active">
      <div class="title">Chapter I — The Awakening</div>
    </div>

    <div id="scene2" class="scene">
      <div class="card">
        <div class="crown">👑</div>
        <img src="her-photo.jpeg" />
        <h1>Porsche</h1>
        <div id="letter"></div>
      </div>
    </div>

    <div id="scene3" class="scene">
      <div id="gift">🎁</div>
      <div id="cake">🎂</div>
    </div>

    <audio id="music" src="heaven-sent.mp3"></audio>

    <script>
      function show(id) {
        document
          .querySelectorAll('.scene')
          .forEach((s) => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
      }

      function unlock() {
        let code = document.getElementById('code').value.toLowerCase().trim();
        if (code === 'brooklyn') {
          document.getElementById('login').style.display = 'none';
          document.getElementById('music').play();

          startFX();

          setTimeout(() => show('scene1'), 400);
          setTimeout(() => show('scene2'), 4200);
          setTimeout(typeWriter, 1500);
          setTimeout(() => show('scene3'), 14000);
          setTimeout(openGift, 14500);
        } else alert('Wrong code');
      }

      function typeWriter() {
        let text = `Happy Birthday Porsche ❤️

Today is not ordinary.
It is a celebration of presence, of warmth, of light.

You carry a rare kind of beauty,
the kind that doesn’t ask for attention,
but naturally becomes unforgettable. Happy birthday babe😘 I love you so much ❤🌹`;

        let i = 0;
        let el = document.getElementById('letter');
        el.style.opacity = 1;

        function write() {
          if (i < text.length) {
            el.innerHTML += text[i++];
            let delay = text[i] === '.' || text[i] === ',' ? 110 : 28;
            setTimeout(write, delay);
          }
        }
        write();
      }

      function openGift() {
        let g = document.getElementById('gift');
        let c = document.getElementById('cake');

        g.style.opacity = 1;
        g.style.transform = 'scale(1.3)';

        setTimeout(() => (c.style.opacity = 1), 1200);
      }

      const canvas = document.getElementById('fx');
      const ctx = canvas.getContext('2d');

      canvas.width = innerWidth;
      canvas.height = innerHeight;

      let P = [];

      class Particle {
        constructor() {
          this.x = Math.random() * innerWidth;
          this.y = Math.random() * innerHeight;
          this.vx = (Math.random() - 0.5) * 2.2;
          this.vy = (Math.random() - 0.5) * 2.2;
          this.life = 160;
          this.color = ['#e50914', '#ffffff', '#ffd700'][
            Math.floor(Math.random() * 3)
          ];
          this.size = Math.random() * 2.5;
        }

        draw() {
          ctx.beginPath();
          ctx.fillStyle = this.color;
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.life--;
          this.draw();
        }
      }

      function burst() {
        for (let i = 0; i < 55; i++) {
          P.push(new Particle());
        }
      }

      function star() {
        let p = new Particle();
        p.y = 0;
        p.vy = 3.8;
        P.push(p);
      }

      function loop() {
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        P.forEach((p, i) => {
          p.update();
          if (p.life <= 0) P.splice(i, 1);
        });

        requestAnimationFrame(loop);
      }

      function startFX() {
        setInterval(burst, 800);
        setInterval(star, 500);
        loop();
      }
    </script>
  </body>
</html>
